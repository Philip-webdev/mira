services:
  postgres:
    image: postgres:16-alpine
    container_name: mira-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mira
      POSTGRES_PASSWORD: mira_dev_password
      POSTGRES_DB: mira_dev
    ports:
      - "5432:5432"
    volumes:
      - mira_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mira -d mira_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mira-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - mira_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mira_postgres_data:
  mira_redis_data:
